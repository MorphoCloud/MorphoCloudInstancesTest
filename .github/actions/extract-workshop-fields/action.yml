name: "Extract workshop fields"
description: "Extract workshop request fields"
inputs:
  token:
    description: "GITHUB_TOKEN or repo scoped PAT"
    required: true
  repository:
    description: "The full name of the repository in which the issue exists"
    required: true
  issue_number:
    description: "Issue number identifying the workshop request"
    required: true
outputs:
  title:
    description: "Workshop title"
    value: ${{ steps.extract.outputs.title }}
  instance_flavor:
    description: "Instance flavor requested for workshop instances"
    value: ${{ steps.extract.outputs.instance_flavor }}
  description:
    description: "Workshop description"
    value: ${{ steps.extract.outputs.description }}
  duration_days:
    description: "Workshop duration in days"
    value: ${{ steps.extract.outputs.duration_days }}
  number_of_instances:
    description: "Number of instances requested"
    value: ${{ steps.extract.outputs.number_of_instances }}
  email:
    description: "Workshop organizer email"
    value: ${{ steps.extract.outputs.email }}
  confirm_email:
    description: "Workshop organizer confirmed email"
    value: ${{ steps.extract.outputs.confirm_email }}
runs:
  using: "composite"
  steps:
    - name: Fetch the issue
      id: read_issue_body
      shell: bash
      run: |
        echo "body<<EOF" >> $GITHUB_OUTPUT
        gh issue view ${{ inputs.issue_number }} \
          --repo ${{ inputs.repository }} \
          --json body \
          --jq .body >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      env:
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Issue Forms Body Parser
      id: parse
      uses: zentered/issue-forms-body-parser@v2.2.0
      with:
        body: ${{ steps.read_issue_body.outputs.body }}

    - name: Display parsed data
      shell: bash
      run: |
        printf '%s\n' "$DATA" | jq -r .
      env:
        DATA: ${{ steps.parse.outputs.data }}

    - name: Extract fields
      id: extract
      shell: bash
      run: |
        title=$(
          printf '%s\n' "$DATA" |
          jq -r '.title.text'
        )
        echo "title=$title" >> $GITHUB_OUTPUT

        instance_flavor=$(
          printf '%s\n' "$DATA" |
          jq -r '."cloud-computing-instance-flavor".text | split(" - ")[0]'
        )
        echo "instance_flavor=$instance_flavor" >> $GITHUB_OUTPUT

        description=$(
          printf '%s\n' "$DATA" |
          jq -r '.description.text'
        )
        echo "description<<EOF" >> $GITHUB_OUTPUT
        printf '%s\n' "$description" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

        duration_days=$(
          printf '%s\n' "$DATA" |
          jq -r '."duration-days".text'
        )
        echo "duration_days=$duration_days" >> $GITHUB_OUTPUT

        number_of_instances=$(
          printf '%s\n' "$DATA" |
          jq -r '."number-of-instances".text'
        )
        echo "number_of_instances=$number_of_instances" >> $GITHUB_OUTPUT

        # Also strip "<" and ">" to convert from "<name@domain.org>" to "name@domain.org"
        email=$(
          printf '%s\n' "$DATA" |
          jq -r ".email.text" |
          sed -E 's/^<([^<>]+)>$/\1/'
        )
        echo "email=$email" >> $GITHUB_OUTPUT

        confirm_email=$(
          printf '%s\n' "$DATA" |
          jq -r '."confirm-email".text // empty' |
          sed -E 's/^<([^<>]+)>$/\1/'
        )
        if [[ -z "$confirm_email" ]]; then
          confirm_email="$email"
        fi
        echo "confirm_email=$confirm_email" >> $GITHUB_OUTPUT
      env:
        DATA: ${{ steps.parse.outputs.data }}
